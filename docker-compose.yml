version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: story-edit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: story_edit
      POSTGRES_PASSWORD: story_edit_dev
      POSTGRES_DB: story_edit
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U story_edit']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: story-edit-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: story-edit-server
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      SERVER_PORT: '3001'
      DATABASE_URL: postgres://story_edit:story_edit_dev@postgres:5432/story_edit
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AI_KEY_ENCRYPTION_SECRET: ${AI_KEY_ENCRYPTION_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: story-edit-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://server:3001
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
